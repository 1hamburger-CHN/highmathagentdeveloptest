# 复变函数知识库 (v1)
# 17个知识节点，覆盖复数基础、解析函数、初等函数、复积分、级数展开、留数定理、共形映射
# Schema: id, title, content (definition, theorems, examples, misconceptions), prerequisites, related, difficulty, bloom_level

nodes:
  # ============================================================
  # 1. 复数与复平面
  # ============================================================

  - id: 'complex-1.1'
    title: '复数定义与运算'
    difficulty: 1
    bloom_level: 1
    content:
      definition: |
        设 $x, y \in \mathbb{R}$，称 $z = x + iy$ 为**复数**，其中 $i$ 为虚数单位，满足 $i^2 = -1$。
        $x = \operatorname{Re}(z)$ 称为实部，$y = \operatorname{Im}(z)$ 称为虚部。

        **基本运算**：
        - 加减：$(x_1 + iy_1) \pm (x_2 + iy_2) = (x_1 \pm x_2) + i(y_1 \pm y_2)$
        - 乘法：$(x_1 + iy_1)(x_2 + iy_2) = (x_1x_2 - y_1y_2) + i(x_1y_2 + x_2y_1)$
        - 共轭：$\bar{z} = x - iy$
        - 模：$|z| = \sqrt{x^2 + y^2} = \sqrt{z\bar{z}}$
        - 除法：$\frac{z_1}{z_2} = \frac{z_1\bar{z_2}}{|z_2|^2} \quad (z_2 \neq 0)$
      theorems: []
      examples:
        - question: '设 $z_1 = 2 + 3i$, $z_2 = 1 - i$，求 $z_1z_2$ 和 $\frac{z_1}{z_2}$'
          solution: |
            $z_1z_2 = (2+3i)(1-i) = 2 - 2i + 3i - 3i^2 = 2 + i + 3 = 5 + i$

            $\frac{z_1}{z_2} = \frac{2+3i}{1-i} \cdot \frac{1+i}{1+i} = \frac{(2+3i)(1+i)}{1+1} = \frac{-1 + 5i}{2} = -\frac{1}{2} + \frac{5}{2}i$
      misconceptions:
        - '复数就是向量 — 复数可以表示为向量，但复数还有乘除运算和代数结构，两者不是同一概念'
        - '$i = \sqrt{-1}$ 是唯一定义 — 实际上 $i$ 和 $-i$ 都满足 $i^2 = -1$，选择哪个是约定的'
    prerequisites: []
    related: ["complex-1.2"]

  - id: 'complex-1.2'
    title: '复数的几何表示与棣莫弗公式'
    difficulty: 2
    bloom_level: 2
    content:
      definition: |
        **极坐标表示**：$z = r(\cos\theta + i\sin\theta)$，其中 $r = |z|$ 为模，$\theta = \arg z$ 为辐角。

        **辐角主值**：通常取 $\arg z \in (-\pi, \pi]$ 或 $[0, 2\pi)$。

        **棣莫弗(De Moivre)公式**：
        $$(\cos\theta + i\sin\theta)^n = \cos(n\theta) + i\sin(n\theta)$$

        **欧拉(Euler)公式**：$e^{i\theta} = \cos\theta + i\sin\theta$，故 $z = re^{i\theta}$
      theorems:
        - statement: '棣莫弗公式: $(\cos\theta + i\sin\theta)^n = \cos(n\theta) + i\sin(n\theta)$'
      examples:
        - question: '将 $z = -1 + i\sqrt{3}$ 化为极坐标形式'
          solution: |
            $r = \sqrt{(-1)^2 + (\sqrt{3})^2} = 2$
            $\theta = \pi - \frac{\pi}{3} = \frac{2\pi}{3}$（第二象限）
            故 $z = 2(\cos\frac{2\pi}{3} + i\sin\frac{2\pi}{3}) = 2e^{i\cdot 2\pi/3}$
        - question: '用棣莫弗公式计算 $(1+i)^{10}$'
          solution: |
            $1+i = \sqrt{2}(\cos\frac{\pi}{4} + i\sin\frac{\pi}{4})$
            $(1+i)^{10} = (\sqrt{2})^{10}(\cos\frac{10\pi}{4} + i\sin\frac{10\pi}{4}) = 32(\cos\frac{5\pi}{2} + i\sin\frac{5\pi}{2}) = 32(0 + i) = 32i$
      misconceptions:
        - '辐角是唯一的 — 辐角可以差 $2\pi$ 的整数倍，主值是唯一定义的'
        - '棣莫弗公式对任何n都成立 — 对，不仅对正整数成立，但对非整数次幂需要小心多值性'
    prerequisites: ["complex-1.1"]
    related: ["complex-1.1", "complex-1.3"]

  - id: 'complex-1.3'
    title: '复数的n次方根'
    difficulty: 2
    bloom_level: 3
    content:
      definition: |
        设 $z = re^{i\theta} \neq 0$，方程 $w^n = z$ 的 $n$ 个根为：
        $$w_k = \sqrt[n]{r} \cdot e^{i(\theta + 2k\pi)/n}, \quad k = 0, 1, \ldots, n-1$$

        这 $n$ 个根均匀分布在以原点为圆心、$\sqrt[n]{r}$ 为半径的圆周上。
      theorems:
        - statement: '非零复数的n次方根恰有n个，且均匀分布在圆周上'
      examples:
        - question: '求 $\sqrt[3]{1}$（1的立方根）'
          solution: |
            $1 = e^{i\cdot 0}$，$r=1$, $\theta=0$
            $w_k = \sqrt[3]{1} \cdot e^{i(0+2k\pi)/3} = e^{i\cdot 2k\pi/3}, \quad k=0,1,2$
            $w_0 = 1$, $w_1 = e^{i\cdot 2\pi/3} = -\frac{1}{2} + i\frac{\sqrt{3}}{2}$, $w_2 = e^{i\cdot 4\pi/3} = -\frac{1}{2} - i\frac{\sqrt{3}}{2}$
      misconceptions:
        - '$\sqrt[3]{1}$ 只有一个值1 — 在实数范围内是对的，在复数范围内有3个值'
        - '单位根是无聊的练习题 — 单位根在FFT、信号处理中有重要应用'
    prerequisites: ["complex-1.2"]
    related: ["complex-1.2"]

  # ============================================================
  # 2. 解析函数
  # ============================================================

  - id: 'complex-2.1'
    title: '复变函数的极限与连续'
    difficulty: 2
    bloom_level: 2
    content:
      definition: |
        设复变函数 $w = f(z)$ 在 $z_0$ 的某去心邻域内有定义。
        若 $\forall \varepsilon > 0, \exists \delta > 0$，当 $0 < |z - z_0| < \delta$ 时恒有 $|f(z) - A| < \varepsilon$，
        则称 $\lim_{z \to z_0} f(z) = A$。

        $f(z)$ 在 $z_0$ 处**连续** $\iff \lim_{z \to z_0} f(z) = f(z_0)$。

        **关键区别**：$z \to z_0$ 是在复平面上从**任意方向**趋近，比实函数的一维趋近严格得多。
      theorems: []
      examples:
        - question: '讨论 $f(z) = \frac{\bar{z}}{z}$ 在 $z \to 0$ 时的极限'
          solution: |
            沿实轴 ($z = x$): $\lim_{x \to 0} \frac{x}{x} = 1$
            沿虚轴 ($z = iy$): $\lim_{y \to 0} \frac{-iy}{iy} = -1$
            两个方向极限不同，故极限不存在。这说明复极限要求所有方向一致。
      misconceptions:
        - '复极限和实极限一样 — 复极限要求从复平面上任意方向趋近都得到同一极限值，条件远强于实极限'
        - '连续函数自动可导 — 在复变函数中同样不成立，$f(z)=\bar{z}$ 处处连续但处处不可导'
    prerequisites: ["complex-1.1"]
    related: ["complex-2.2"]

  - id: 'complex-2.2'
    title: '解析函数与Cauchy-Riemann方程'
    difficulty: 4
    bloom_level: 3
    content:
      definition: |
        设 $f(z) = u(x,y) + iv(x,y)$ 在区域 $D$ 内可导，若导数 $f'(z)$ 存在，则：

        **Cauchy-Riemann方程 (C-R方程)**：
        $$\frac{\partial u}{\partial x} = \frac{\partial v}{\partial y}, \quad \frac{\partial u}{\partial y} = -\frac{\partial v}{\partial x}$$

        $f(z)$ 在 $z_0$ 处**可导** $\iff$ $u, v$ 在 $(x_0, y_0)$ 可微且满足 C-R 方程。
        $f(z)$ 在区域 $D$ 内**解析（全纯）** $\iff$ $f(z)$ 在 $D$ 内每一点可导。

        **导数公式**：$f'(z) = u_x + iv_x = v_y - iu_y$
      theorems:
        - statement: '可导的充要条件：u,v可微且满足C-R方程'
        - statement: '若偏导数连续且满足C-R方程，则f(z)解析（充分条件）'
      examples:
        - question: '验证 $f(z) = z^2$ 是解析函数并求导'
          solution: |
            $f(z) = (x+iy)^2 = (x^2 - y^2) + i(2xy)$
            $u = x^2 - y^2$, $v = 2xy$
            $u_x = 2x = v_y$, $u_y = -2y = -v_x$ ✓ C-R方程成立
            $f'(z) = u_x + iv_x = 2x + i(2y) = 2(x+iy) = 2z$ ✓
        - question: '证明 $f(z) = \bar{z} = x - iy$ 处处不可导'
          solution: |
            $u = x$, $v = -y$
            $u_x = 1$, $v_y = -1$，$u_x \neq v_y$，C-R方程不成立
            故 $f(z) = \bar{z}$ 在复平面上处处不可导。
      misconceptions:
        - 'C-R方程成立就一定能保证可导 — 还需要u,v可微，仅偏导数存在不够（反例：f(z)=√{|xy|}在原点）'
        - '可导和解析是一个概念 — 单点可导不等于解析，解析要求在某个区域内处处可导'
    prerequisites: ["complex-2.1"]
    related: ["complex-2.1", "complex-2.3"]

  - id: 'complex-2.3'
    title: '调和函数与共轭调和函数'
    difficulty: 3
    bloom_level: 2
    content:
      definition: |
        若区域 $D$ 内的实函数 $u(x,y)$ 满足 Laplace 方程：
        $$\Delta u = \frac{\partial^2 u}{\partial x^2} + \frac{\partial^2 u}{\partial y^2} = 0$$
        则称 $u$ 为 $D$ 内的**调和函数**。

        **核心结论**：若 $f = u + iv$ 解析，则 $u$ 和 $v$ 都是调和函数，且 $v$ 称为 $u$ 的**共轭调和函数**。
      theorems:
        - statement: '解析函数的实部和虚部均为调和函数'
        - statement: '给定调和函数u，可通过C-R方程求出其共轭调和函数v（差一个常数）'
      examples:
        - question: '验证 $u(x,y) = x^2 - y^2$ 是调和函数，并求其共轭调和函数 $v$'
          solution: |
            $u_{xx} = 2$, $u_{yy} = -2$，$u_{xx} + u_{yy} = 0$ → $u$ 调和 ✓
            由C-R方程：$v_y = u_x = 2x$ → $v = 2xy + \varphi(x)$
            $v_x = 2y + \varphi'(x) = -u_y = 2y$ → $\varphi'(x) = 0$ → $\varphi(x) = C$
            故 $v = 2xy + C$，$f(z) = (x^2 - y^2) + i(2xy) = z^2$
      misconceptions:
        - '调和函数一定是一个解析函数的实部 — 在单连通区域成立，多连通区域不一定'
        - '共轭调和函数是唯一的 — 相差一个常数'
    prerequisites: ["complex-2.2"]
    related: ["complex-2.2"]

  # ============================================================
  # 3. 初等复变函数
  # ============================================================

  - id: 'complex-3.1'
    title: '复指数函数与对数函数'
    difficulty: 2
    bloom_level: 2
    content:
      definition: |
        **复指数函数**：$e^z = e^{x+iy} = e^x(\cos y + i\sin y)$
        - 周期为 $2\pi i$：$e^{z+2\pi i} = e^z$
        - $|e^z| = e^x$，$\arg(e^z) = y$

        **复对数函数**（多值函数）：
        $$\operatorname{Ln} z = \ln|z| + i\arg z + 2k\pi i = \ln r + i(\theta + 2k\pi)$$
        主值分支：$\ln z = \ln|z| + i\operatorname{Arg} z$，其中 $\operatorname{Arg} z \in (-\pi, \pi]$
      theorems:
        - statement: '$e^{z_1+z_2} = e^{z_1}e^{z_2}$ 在复数域仍成立'
        - statement: '$\operatorname{Ln}(z_1z_2) = \operatorname{Ln} z_1 + \operatorname{Ln} z_2$（作为集合等式）'
      examples:
        - question: '计算 $\ln(1+i)$（取主值）'
          solution: |
            $|1+i| = \sqrt{2}$，$\arg(1+i) = \frac{\pi}{4}$
            $\ln(1+i) = \ln\sqrt{2} + i\frac{\pi}{4} = \frac{1}{2}\ln 2 + i\frac{\pi}{4}$
        - question: '求满足 $e^z = 1 + i$ 的所有 $z$'
          solution: |
            $1+i = \sqrt{2}e^{i\pi/4}$
            $z = \operatorname{Ln}(1+i) = \ln\sqrt{2} + i(\frac{\pi}{4} + 2k\pi), \quad k \in \mathbb{Z}$
      misconceptions:
        - '$\ln(-1)$ 在复数中没有意义 — 错！$\ln(-1) = \ln 1 + i\pi = i\pi$（主值），只是在实数中没有意义'
        - '复指数函数是单射 — 错，$e^z$ 以 $2\pi i$ 为周期，不是单射'
    prerequisites: ["complex-1.2"]
    related: ["complex-1.2", "complex-3.2"]

  - id: 'complex-3.2'
    title: '复幂函数与三角函数'
    difficulty: 3
    bloom_level: 3
    content:
      definition: |
        **复幂函数**（多值，$\alpha$ 为非整数时）：
        $$z^\alpha = e^{\alpha \operatorname{Ln} z}$$

        **复三角函数**：
        $$\sin z = \frac{e^{iz} - e^{-iz}}{2i}, \quad \cos z = \frac{e^{iz} + e^{-iz}}{2}$$

        **重要性质**：
        - $\sin z, \cos z$ 在复平面上无界！(与实函数完全不同)
        - 如 $\cos(i) = \frac{e^{-1} + e^{1}}{2} \approx 1.54 > 1$
        - $\sin^2 z + \cos^2 z = 1$ 在复数域仍成立
      theorems:
        - statement: '$\sin z$ 和 $\cos z$ 在复平面上是解析的，$(\sin z)'' = \cos z$, $(\cos z)'' = -\sin z$'
        - statement: '$\sin(-z) = -\sin z$, $\cos(-z) = \cos z$ 及所有三角恒等式在复数域成立'
      examples:
        - question: '计算 $\cos(i)$'
          solution: |
            $\cos(i) = \frac{e^{i\cdot i} + e^{-i\cdot i}}{2} = \frac{e^{-1} + e^{1}}{2} = \cosh 1 \approx 1.543$
            这大于1，说明复三角函数不是有界函数！
      misconceptions:
        - '正弦余弦的值域是[-1, 1] — 仅在实数域成立，在复数域中 $\sin z$ 和 $\cos z$ 无界'
        - '$(z^\alpha)'' = \alpha z^{\alpha-1}$ 总成立 — 因为 $z^\alpha$ 可能是多值函数，需要考虑分支'
    prerequisites: ["complex-3.1", "complex-1.2"]
    related: ["complex-3.1"]

  # ============================================================
  # 4. 复积分
  # ============================================================

  - id: 'complex-4.1'
    title: '复积分的定义与基本性质'
    difficulty: 2
    bloom_level: 2
    content:
      definition: |
        设 $C$ 为一条光滑曲线，参数方程 $z = z(t), a \leq t \leq b$，$f(z)$ 在 $C$ 上连续：

        $$\int_C f(z)\,dz = \int_a^b f(z(t))\,z'(t)\,dt$$

        **基本性质**：
        - 线性：$\int_C [\alpha f(z) + \beta g(z)]\,dz = \alpha\int_C f\,dz + \beta\int_C g\,dz$
        - 反向：$\int_{-C} f(z)\,dz = -\int_C f(z)\,dz$
        - **模不等式**：$\left|\int_C f(z)\,dz\right| \leq \int_C |f(z)|\,|dz| = \int_a^b |f(z(t))|\,|z'(t)|\,dt \leq ML$
          其中 $M = \max_{z \in C} |f(z)|$，$L$ 为曲线 $C$ 的弧长。
      theorems:
        - statement: '模不等式 (ML估计): $|\int_C f(z)dz| \leq ML$'
      examples:
        - question: '计算 $\int_C \bar{z}\,dz$，$C$ 为从 $0$ 到 $1+i$ 的直线段'
          solution: |
            C参数化：$z(t) = t + it = (1+i)t$, $0 \leq t \leq 1$
            $f(z) = \bar{z} = t - it$, $z'(t) = 1 + i$
            $\int_C \bar{z}\,dz = \int_0^1 (t-it)(1+i)\,dt = (1+i)\int_0^1 t(1-i)\,dt = (1+i)(1-i)\int_0^1 t\,dt = 2 \cdot \frac{1}{2} = 1$
      misconceptions:
        - '复积分就是实积分的简单推广 — 复积分依赖于路径！即使被积函数处处解析，不同路径可能导致相同或不同结果'
        - '模不等式是等式 — 通常只是上界估计，只在特定条件下取等号'
    prerequisites: ["complex-1.1", "complex-2.1"]
    related: ["complex-4.2"]

  - id: 'complex-4.2'
    title: 'Cauchy-Goursat定理'
    difficulty: 4
    bloom_level: 3
    content:
      definition: |
        **Cauchy定理**：若 $f(z)$ 在单连通区域 $D$ 内解析，则对 $D$ 内任一条简单闭曲线 $C$：
        $$\oint_C f(z)\,dz = 0$$

        **Cauchy-Goursat定理**（加强版）：
        只需 $f'(z)$ 存在（不需要连续），结论仍成立。Goursat去掉了Cauchy原证明中对 $f'$ 连续的要求。

        **推论 — 路径无关性**：
        在单连通区域内，解析函数的积分与路径无关，仅与起点和终点有关。
      theorems:
        - statement: 'Cauchy-Goursat定理: f在单连通区域D内解析 ⇒ 沿D内任一条简单闭曲线的积分为0'
        - statement: '复合闭路定理: 可将闭曲线变形而不改变积分值（边界可连续变形）'
      examples:
        - question: '计算 $\oint_{|z|=1} z^n\,dz$'
          solution: |
            $f(z) = z^n$ 在复平面上处处解析。
            由Cauchy-Goursat定理，$\oint_{|z|=1} z^n\,dz = 0$（对所有 $n \geq 0$）。
            （注意：$n = -1$ 时 $1/z$ 在原点不解析，定理不适用！）
        - question: '利用路径无关性计算 $\int_C e^z\,dz$，C为从0到1+i的任意曲线'
          solution: |
            $e^z$ 处处解析，积分与路径无关。
            取单变量路径：先沿实轴 $0 \to 1$，再竖直上 $1 \to 1+i$
            $\int_0^1 e^x\,dx + \int_0^1 e^{1+iy}\cdot i\,dy = (e-1) + ie\int_0^1 e^{iy}dy = e-1 + ie[\frac{e^{iy}}{i}]_0^1 = e-1 + e(e^i-1) = e^{1+i} - 1$
            （直接验证：$F(z) = e^z$ 是原函数，$F(1+i)-F(0) = e^{1+i} - 1$ ✓）
      misconceptions:
        - '只要被积函数解析积分就是0 — 还需要闭曲线！开曲线积分不一定是0'
        - 'Cauchy定理对任何区域都成立 — 需要单连通区域。在多连通区域中需要复合闭路定理'
    prerequisites: ["complex-4.1", "complex-2.2"]
    related: ["complex-4.1", "complex-4.3"]

  - id: 'complex-4.3'
    title: 'Cauchy积分公式与高阶导数公式'
    difficulty: 4
    bloom_level: 3
    content:
      definition: |
        **Cauchy积分公式**：若 $f(z)$ 在简单闭曲线 $C$ 内解析，在 $\bar{C}$ 上连续，则对 $C$ 内任一点 $z_0$：
        $$f(z_0) = \frac{1}{2\pi i}\oint_C \frac{f(z)}{z - z_0}\,dz$$

        **高阶导数公式**：
        $$f^{(n)}(z_0) = \frac{n!}{2\pi i}\oint_C \frac{f(z)}{(z - z_0)^{n+1}}\,dz$$

        **惊人结论**：解析函数只要可导一次，就能无穷次可导！这是复分析独有的性质。
      theorems:
        - statement: 'Cauchy积分公式: 解析函数在区域内部的值由其边界上的值完全决定'
        - statement: '解析函数无穷次可导: 一次可导 ⇒ 任意阶可导'
        - statement: 'Morera定理 (Cauchy定理的逆): 若f连续且沿区域内任一闭曲线积分为0，则f解析'
      examples:
        - question: '计算 $\oint_{|z|=2} \frac{e^z}{z-1}\,dz$'
          solution: |
            $f(z) = e^z$ 在 $|z| \leq 2$ 内解析，$z_0 = 1$ 在圆内。
            由Cauchy积分公式：$\oint_{|z|=2} \frac{e^z}{z-1}\,dz = 2\pi i \cdot f(1) = 2\pi i e$
        - question: '计算 $\oint_{|z|=1} \frac{\cos z}{z^3}\,dz$'
          solution: |
            由高阶导数公式 ($n=2$): $\oint \frac{\cos z}{z^3}\,dz = \frac{2\pi i}{2!} f''(0)$
            $f(z)=\cos z$, $f'(z)=-\sin z$, $f''(z)=-\cos z$, $f''(0)=-1$
            故积分为 $\frac{2\pi i}{2} \cdot (-1) = -\pi i$
      misconceptions:
        - 'Cauchy积分公式就是留数定理的特例 — 可以这样理解，但它是有独立价值的核心定理'
        - '解析函数的可导性和实函数一样 — 复解析函数自动无穷阶可导，实可导函数甚至不一定有二阶导数'
    prerequisites: ["complex-4.2", "complex-2.2"]
    related: ["complex-4.2", "complex-6.2"]

  # ============================================================
  # 5. 级数展开
  # ============================================================

  - id: 'complex-5.1'
    title: '泰勒级数'
    difficulty: 3
    bloom_level: 3
    content:
      definition: |
        若 $f(z)$ 在 $z_0$ 处解析，则在以 $z_0$ 为中心、到最近奇点的距离为半径的圆盘内：
        $$f(z) = \sum_{n=0}^{\infty} a_n (z - z_0)^n, \quad a_n = \frac{f^{(n)}(z_0)}{n!} = \frac{1}{2\pi i}\oint_C \frac{f(z)}{(z-z_0)^{n+1}}\,dz$$

        **收敛半径**：$R = \frac{1}{\limsup_{n \to \infty} \sqrt[n]{|a_n|}}$（Cauchy-Hadamard公式）

        也可由奇点决定：$R$ 等于 $z_0$ 到最近奇点的距离。
      theorems:
        - statement: '解析函数的幂级数展开在收敛圆内绝对收敛，且可逐项求导和逐项积分'
        - statement: '幂级数的和函数在其收敛圆内解析'
      examples:
        - question: '求 $f(z) = \frac{1}{1-z}$ 在 $z=0$ 处的泰勒展开和收敛半径'
          solution: |
            $\frac{1}{1-z} = \sum_{n=0}^{\infty} z^n = 1 + z + z^2 + \cdots$
            $z=0$ 不是奇点，$z=1$ 是最近奇点，收敛半径 $R = |1-0| = 1$
        - question: '求 $e^z$ 在 $z=0$ 处的泰勒展开'
          solution: |
            $a_n = \frac{1}{n!}$（$e^z$ 的各阶导数在原点均为1）
            $e^z = \sum_{n=0}^{\infty} \frac{z^n}{n!} = 1 + z + \frac{z^2}{2!} + \frac{z^3}{3!} + \cdots$
            收敛半径 $R = \infty$（$e^z$ 处处解析，无奇点）
      misconceptions:
        - '收敛圆内级数一定收敛到原函数 — 对（解析函数的幂级数展开在收敛圆内和函数就是原函数）'
        - '泰勒展开一定收敛到无穷远 — 收敛半径由最近的奇点决定，有奇点就不能收敛超出该距离'
    prerequisites: ["complex-4.3", "complex-2.2"]
    related: ["complex-5.2", "complex-4.3"]

  - id: 'complex-5.2'
    title: '洛朗级数'
    difficulty: 4
    bloom_level: 3
    content:
      definition: |
        若 $f(z)$ 在环域 $r < |z - z_0| < R$ 内解析，则可展开为**洛朗(Laurent)级数**：
        $$f(z) = \sum_{n=-\infty}^{\infty} a_n (z - z_0)^n = \sum_{n=0}^{\infty} a_n(z-z_0)^n + \sum_{n=1}^{\infty} \frac{b_n}{(z-z_0)^n}$$

        其中：
        $$a_n = \frac{1}{2\pi i}\oint_C \frac{f(z)}{(z-z_0)^{n+1}}\,dz \quad (n = 0, \pm1, \pm2, \ldots)$$

        - $\sum_{n=0}^{\infty} a_n(z-z_0)^n$ 称为**解析部分**（正则部分）
        - $\sum_{n=1}^{\infty} b_n(z-z_0)^{-n}$ 称为**主要部分**（奇异部分）
        - $b_1$ 极为关键——它就是**留数** $\operatorname{Res}[f(z), z_0]$
      theorems:
        - statement: '洛朗展开在给定环域内是唯一的'
      examples:
        - question: '求 $f(z) = \frac{1}{z(z-1)}$ 在 $0 < |z| < 1$ 内的洛朗展开'
          solution: |
            $\frac{1}{z(z-1)} = -\frac{1}{z} \cdot \frac{1}{1-z} = -\frac{1}{z}\sum_{n=0}^{\infty} z^n = -\frac{1}{z} - 1 - z - z^2 - \cdots$
            主要部分：$-\frac{1}{z}$，留数 $\operatorname{Res}[f, 0] = -1$
        - question: '为什么需要洛朗级数而不仅是泰勒级数？'
          solution: |
            泰勒级数只在解析点处存在（展开式只有非负次幂）。
            $f(z) = \frac{1}{z}$ 在 $z=0$ 处有奇点，无法做泰勒展开。
            洛朗级数允许负次幂项，可以在环域内展开有孤立奇点的函数。
      misconceptions:
        - '洛朗展开是唯一的 — 在给定的环域内是唯一的。不同环域可能有不同的展开式'
        - '主要部分只有一项 — 可能有无限多项（本性奇点的情况），如 $e^{1/z} = \sum_{n=0}^{\infty} \frac{1}{n!z^n}$'
    prerequisites: ["complex-5.1", "complex-4.3"]
    related: ["complex-5.1", "complex-6.1", "complex-6.2"]

  # ============================================================
  # 6. 留数定理
  # ============================================================

  - id: 'complex-6.1'
    title: '孤立奇点分类'
    difficulty: 3
    bloom_level: 3
    content:
      definition: |
        若 $f(z)$ 在 $0 < |z - z_0| < \rho$ 内解析，但在 $z_0$ 处不解析，则 $z_0$ 为 $f(z)$ 的**孤立奇点**。

        根据洛朗展开中主要部分的项数分类：
        - **可去奇点**：主要部分为0（$b_n = 0$ 对所有 $n$）。$\lim_{z \to z_0} f(z)$ 存在且有限。
          例：$\frac{\sin z}{z}$ 在 $z=0$ 处（补充定义 $f(0)=1$ 后解析）
        - **极点**：主要部分只有有限项。若 $b_m \neq 0$ 且 $b_{m+1} = b_{m+2} = \cdots = 0$，称为 $m$ 阶极点。
          例：$\frac{1}{z^2}$ 在 $z=0$ 处是2阶极点
        - **本性奇点**：主要部分有无穷多项。
          例：$e^{1/z} = 1 + \frac{1}{z} + \frac{1}{2!z^2} + \cdots$ 在 $z=0$ 处
      theorems:
        - statement: 'Riemann定理: f在z0附近有界 ⇒ z0是可去奇点'
        - statement: '极点的充要条件: $\lim_{z \to z_0} |f(z)| = \infty$'
        - statement: 'Casorati-Weierstrass定理: 在本性奇点附近，f(z)可以逼近任意复数值'
      examples:
        - question: '判断 $f(z) = \frac{1 - \cos z}{z^2}$ 在 $z=0$ 处的奇点类型'
          solution: |
            $\cos z = 1 - \frac{z^2}{2!} + \frac{z^4}{4!} - \cdots$
            $1 - \cos z = \frac{z^2}{2} - \frac{z^4}{24} + \cdots$
            $\frac{1 - \cos z}{z^2} = \frac{1}{2} - \frac{z^2}{24} + \cdots$
            主要部分为0，$z=0$ 是可去奇点。$\lim_{z \to 0} f(z) = \frac{1}{2}$
      misconceptions:
        - '$\infty$ 是极点 — 不一定是。$\infty$ 可以是可去奇点、极点或本性奇点，取决于 $f(1/z)$ 在 $z=0$ 处的奇点类型'
        - '所有奇点都是孤立的 — 错。如 $f(z) = \frac{1}{\sin(1/z)}$ 在 $z=0$ 处就不是孤立奇点（奇点聚于原点）'
    prerequisites: ["complex-5.2"]
    related: ["complex-5.2", "complex-6.2"]

  - id: 'complex-6.2'
    title: '留数与留数定理'
    difficulty: 4
    bloom_level: 3
    content:
      definition: |
        设 $z_0$ 为 $f(z)$ 的孤立奇点，$f$ 在 $0 < |z - z_0| < R$ 内的洛朗展开为：
        $$f(z) = \sum_{n=-\infty}^{\infty} a_n (z - z_0)^n$$

        **留数**：$\operatorname{Res}[f(z), z_0] = a_{-1}$（洛朗展开中 $(z-z_0)^{-1}$ 的系数）

        **留数定理**：若 $f(z)$ 在简单闭曲线 $C$ 内除有限个孤立奇点 $z_1, \ldots, z_n$ 外解析，则：
        $$\oint_C f(z)\,dz = 2\pi i \sum_{k=1}^{n} \operatorname{Res}[f(z), z_k]$$

        **留数计算规则**：
        - **1阶极点**：$\operatorname{Res}[f, z_0] = \lim_{z \to z_0} (z - z_0)f(z)$
        - **m阶极点**：$\operatorname{Res}[f, z_0] = \frac{1}{(m-1)!}\lim_{z \to z_0} \frac{d^{m-1}}{dz^{m-1}}[(z - z_0)^m f(z)]$
        - **本性奇点**：只能用洛朗展开找 $a_{-1}$
      theorems:
        - statement: '留数定理: $\oint_C f(z)dz = 2\pi i \sum \operatorname{Res}$'
      examples:
        - question: '计算 $\oint_{|z|=2} \frac{dz}{z^2 + 1}$'
          solution: |
            $z^2 + 1 = 0$ → $z = \pm i$，两个1阶极点均在 $|z|=2$ 内。
            $\operatorname{Res}[f, i] = \lim_{z \to i} \frac{z-i}{(z-i)(z+i)} = \frac{1}{2i}$
            $\operatorname{Res}[f, -i] = \lim_{z \to -i} \frac{z+i}{(z-i)(z+i)} = \frac{1}{-2i}$
            由留数定理：$\oint = 2\pi i(\frac{1}{2i} + \frac{1}{-2i}) = 2\pi i(0) = 0$
            （验证：被积函数是偶函数在对称区域上积分，确实为0）
      misconceptions:
        - '留数就是极点处的留数 — 留数是为任何孤立奇点定义的，包括可去奇点和本性奇点'
        - '留数定理只能算围道积分 — 它在计算实积分中有巨大应用，见下一节'
    prerequisites: ["complex-6.1", "complex-5.2", "complex-4.3"]
    related: ["complex-6.1", "complex-6.3", "complex-4.3"]

  - id: 'complex-6.3'
    title: '留数在实积分中的应用'
    difficulty: 4
    bloom_level: 4
    content:
      definition: |
        留数定理可将一些难算的**实积分**转化为围道积分来计算。三类典型：

        **类型1 — 三角函数有理式积分**：$\int_0^{2\pi} R(\cos\theta, \sin\theta)\,d\theta$
        令 $z = e^{i\theta}$，$\cos\theta = \frac{z+z^{-1}}{2}$, $\sin\theta = \frac{z-z^{-1}}{2i}$, $d\theta = \frac{dz}{iz}$
        转化为单位圆上的围道积分。

        **类型2 — 有理函数的反常积分**：$\int_{-\infty}^{\infty} \frac{P(x)}{Q(x)}\,dx$（$Q$ 比 $P$ 至少高2次）
        用上半平面围道（实轴 + 上半大圆弧），大圆弧积分为0。

        **类型3 — 含三角函数的反常积分**：$\int_{-\infty}^{\infty} f(x)\cos(mx)\,dx$ 或 $\int_{-\infty}^{\infty} f(x)\sin(mx)\,dx$
        用 Jordan 引理。
      theorems:
        - statement: '若 $|f(z)| \leq M/R^k$（$k>1$），则大圆弧上的积分在 $R \to \infty$ 时为0'
      examples:
        - question: '计算 $\int_0^{2\pi} \frac{d\theta}{5 + 4\cos\theta}$'
          solution: |
            令 $z = e^{i\theta}$，$\cos\theta = \frac{z+z^{-1}}{2}$, $d\theta = \frac{dz}{iz}$
            $\int_0^{2\pi} \frac{d\theta}{5+4\cos\theta} = \oint_{|z|=1} \frac{dz/iz}{5 + 2(z+z^{-1})} = \oint \frac{dz}{i(2z^2 + 5z + 2)} = \frac{1}{i}\oint \frac{dz}{(2z+1)(z+2)}$

            $z=-1/2$ 在单位圆内（1阶极点），$z=-2$ 在圆外。
            $\operatorname{Res}[f, -1/2] = \lim_{z \to -1/2} \frac{z+1/2}{(2z+1)(z+2)} = \frac{1}{2(3/2)} = \frac{1}{3}$

            $\int_0^{2\pi} \frac{d\theta}{5+4\cos\theta} = \frac{1}{i} \cdot 2\pi i \cdot \frac{1}{3} = \frac{2\pi}{3}$
        - question: '计算 $\int_{-\infty}^{\infty} \frac{dx}{x^2 + 1}$'
          solution: |
            考虑 $\oint_C \frac{dz}{z^2+1}$，C 为上半平面围道。
            上半平面内奇点：$z = i$（1阶极点）。
            $\operatorname{Res}[f, i] = \frac{1}{2i}$
            $\oint = 2\pi i \cdot \frac{1}{2i} = \pi$
            大圆弧上积分 → 0（$R \to \infty$），故 $\int_{-\infty}^{\infty} \frac{dx}{x^2+1} = \pi$（验证：$\arctan x|_{-\infty}^{\infty} = \pi$ ✓）
      misconceptions:
        - '任何实积分都能用留数算 — 只有特定类型的积分适用，需要满足围道积分的条件'
        - '围道可以任意选择 — 围道的选择直接影响计算的方便程度，选择不当可能导致无法求解'
    prerequisites: ["complex-6.2", "complex-4.3"]
    related: ["complex-6.2"]

  # ============================================================
  # 7. 共形映射 (选讲)
  # ============================================================

  - id: 'complex-7.1'
    title: '共形映射与分式线性变换'
    difficulty: 3
    bloom_level: 2
    content:
      definition: |
        解析函数 $w = f(z)$ 在 $f'(z_0) \neq 0$ 处是**共形映射**（保角映射）：
        - **保角性**：过 $z_0$ 的任意两条曲线经映射后的夹角大小和方向保持不变
        - **伸缩率不变性**：$|f'(z_0)|$ 是映射在 $z_0$ 处的局部伸缩率

        **分式线性变换 (Möbius变换)**：
        $$w = \frac{az + b}{cz + d}, \quad ad - bc \neq 0$$
        这是最重要的共形映射之一，将圆/直线映射为圆/直线（保圆性），且由3个点的对应关系唯一确定。
      theorems:
        - statement: 'Möbius变换将圆/直线映射为圆/直线（在黎曼球面上均视为"圆"）'
        - statement: 'Möbius变换保持交比不变: $\frac{w_1 - w_3}{w_1 - w_4} : \frac{w_2 - w_3}{w_2 - w_4} = \frac{z_1 - z_3}{z_1 - z_4} : \frac{z_2 - z_3}{z_2 - z_4}$'
      examples:
        - question: '求将上半平面映射为单位圆盘的分式线性变换'
          solution: |
            $w = e^{i\theta}\frac{z - z_0}{z - \bar{z_0}}$ 将上半平面映射为单位圆盘，其中 $\operatorname{Im}(z_0) > 0$。

            最简单的例子（$z_0 = i$, $\theta = 0$）：$w = \frac{z - i}{z + i}$
            验证：实轴上的点 ($z = x$) → $|w| = |\frac{x-i}{x+i}| = 1$ ✓
            $z = i$ → $w = 0$（圆心映到圆心）✓
      misconceptions:
        - '共形映射一定保角 — 只在 $f''(z) \neq 0$ 的点保角。在 $f''(z)=0$ 的点（如 $f(z)=z^2$ 在原点），角被放大'
        - '共形映射是唯一的限制条件很强的映射 — 实际上黎曼映射定理表明任何单连通真子区域都可以共形映射到单位圆盘'
    prerequisites: ["complex-2.2"]
    related: ["complex-2.2"]
