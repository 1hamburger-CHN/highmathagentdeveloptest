<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>聊天测试</title>
<style>
body{font-family:sans-serif;max-width:700px;margin:20px auto;padding:0 16px}
.msg{padding:8px 14px;border-radius:14px;margin:6px 0;max-width:80%}
.user{background:#7c3aed;color:#fff;margin-left:auto}
.coach{background:#f3f4f6;color:#111}
.system{background:#fef2f2;color:#991b1b;font-size:13px}
#input{display:flex;gap:8px;margin-top:20px}
textarea{flex:1;padding:10px;border:1px solid #d1d5db;border-radius:10px;resize:none}
button{padding:10px 20px;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer}
button:disabled{opacity:.4}
#debug{background:#fef9c3;padding:4px 12px;font-size:12px;margin:8px 0;border-radius:6px}
</style></head>
<body>
<h2>苏格拉底教练 - 测试</h2>
<div id="debug"></div>
<div id="messages"></div>
<div id="input">
<textarea id="ta" placeholder="输入消息..." rows="1"></textarea>
<button id="btn" onclick="send()">发送</button>
</div>
<script>
const API = 'http://localhost:8000/api/chat/stream';
let streamingContent = '';

function log(s) { document.getElementById('debug').textContent = 'DEBUG: ' + s; }

function addMsg(role, text) {
  var d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  document.getElementById('messages').appendChild(d);
}

async function send() {
  var ta = document.getElementById('ta');
  var msg = ta.value.trim();
  if (!msg) return;
  ta.value = '';
  addMsg('user', msg);
  log('发送中...');
  streamingContent = '';

  try {
    var resp = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    });
    log('连接成功, status=' + resp.status);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    var chunks = 0;

    while (true) {
      var {done, value} = await reader.read();
      if (done) { log('流结束, 共' + chunks + '块'); break; }
      chunks++;
      buffer += decoder.decode(value, {stream: true});
      var events = buffer.split('\n\n');
      buffer = events.pop() || '';

      for (var ei = 0; ei < events.length; ei++) {
        var lines = events[ei].split('\n');
        for (var li = 0; li < lines.length; li++) {
          if (lines[li].startsWith('data: ')) {
            try {
              var data = JSON.parse(lines[li].slice(6));
              if (data.role && data.content) {
                streamingContent += data.content;
              }
              if (data.status === 'complete') {
                log('完成, ' + streamingContent.length + '字');
                if (streamingContent) {
                  addMsg('coach', streamingContent);
                }
                streamingContent = '';
              }
            } catch(e) { log('JSON parse error'); }
          }
        }
      }
    }
  } catch(e) {
    log('错误: ' + e.message);
    addMsg('system', '连接失败: ' + e.message);
  }
}
</script>
</body>
</html>
