name: Deploy to Lighthouse

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTHOUSE_HOST }}
          username: root
          key: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
          script: |
            cd /opt/mathagent
            git pull origin master
            docker compose up -d --build
