name: Deploy to Lighthouse

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH and Deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTHOUSE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 ${{ secrets.LIGHTHOUSE_HOST }} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 root@${{ secrets.LIGHTHOUSE_HOST }} '
            cd /opt/mathagent
            git pull origin master
            docker compose up -d --build
          '
